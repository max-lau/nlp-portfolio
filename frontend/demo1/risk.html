<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Scoring — NLP Legal Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1a1a1a; }
    .page { padding: 1.5rem 2rem; max-width: 860px; margin: 0 auto; }
    .page-title { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #64748b; margin-bottom: 1.5rem; }
    textarea { width: 100%; min-height: 130px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; line-height: 1.6; resize: vertical; background: #fff; }
    textarea:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
    .controls { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
    select { padding: 9px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; background: #fff; color: #374151; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn.primary { background: #7c3aed; color: #fff; }
    .btn.primary:hover { background: #6d28d9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .results { margin-top: 1.5rem; display: none; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 12px; }
    .risk-score-big { font-size: 64px; font-weight: 800; line-height: 1; }
    .risk-level { font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .bar-track { width: 100%; height: 12px; background: #f3f4f6; border-radius: 6px; overflow: hidden; margin: 12px 0; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.8s ease; }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
    .breakdown-row:last-child { border-bottom: none; }
    .signal-item { padding: 8px 12px; background: #f9fafb; border-radius: 8px; margin-bottom: 6px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
    .loader { text-align: center; padding: 2rem; color: #64748b; display: none; }
    .examples { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .chip { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: #fff; color: #555; }
    .chip:hover { border-color: #7c3aed; color: #7c3aed; }
  </style>
  <link rel="stylesheet" href="paraiq-sidebar.css">
</head>
<body>

<div class="page">
  <div class="page-title">🚨 Risk Scoring</div>
  <div class="page-sub">Score legal documents 0–10 for risk using criminal, fraud, financial, and regulatory signals.</div>

  <div class="examples">
    <span style="font-size:12px;color:#9ca3af">Examples:</span>
    <span class="chip" onclick="setEx('indictment')">Indictment</span>
    <span class="chip" onclick="setEx('acquittal')">Acquittal</span>
    <span class="chip" onclick="setEx('procedural')">Procedural</span>
  </div>

  <textarea id="txt" placeholder="Paste legal text to assess risk..."></textarea>

  <div class="controls">
    <select id="context">
      <option value="general">General Context</option>
      <option value="criminal">Criminal</option>
      <option value="regulatory">Regulatory</option>
    </select>
    <button class="btn primary" id="scoreBtn" onclick="scoreRisk()">Score Risk</button>
  </div>

  <div class="loader" id="loader">Analyzing risk signals...</div>

  <div class="results" id="results">
    <div class="card">
      <div class="card-title">Risk Score</div>
      <div style="display:flex;align-items:flex-end;gap:16px;">
        <div class="risk-score-big" id="scoreNum">—</div>
        <div>
          <div class="risk-level" id="riskLevel">—</div>
          <div style="font-size:12px;color:#9ca3af;">out of 10</div>
        </div>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
    </div>

    <div class="card">
      <div class="card-title">Category Breakdown</div>
      <div id="breakdown"></div>
    </div>

    <div class="card">
      <div class="card-title">Top Risk Signals</div>
      <div id="signals"></div>
    </div>

    <div class="card">
      <div class="card-title">Mitigating Factors</div>
      <div id="mitigations"></div>
    </div>
  </div>
</div>

<script>
  // ParaIQ API authentication key
  const PARAIQ_KEY = 'pk-84d8657019538fb44aeee9a6a58b2342c5b819c4cceecb3996570d9e980afa40';
  const API = 'https://nlp.para-iq.com';
  const EXAMPLES = {
    indictment: "A grand jury indicted Franklin Estrada for wire fraud and conspiracy. The United States Attorney sought forfeiture of $2 million. Judge Stein sentenced Estrada to 5 years in federal prison.",
    acquittal:  "The defendant was acquitted of all charges. The court found the evidence insufficient and granted the motion to dismiss. All charges were dropped with prejudice.",
    procedural: "The parties filed a joint stipulation extending the discovery deadline. The court scheduled a status conference for next month. Both sides agreed to mediation."
  };

  function setEx(key) { document.getElementById('txt').value = EXAMPLES[key]; }

  function riskColor(level) {
    return { critical:'#dc2626', high:'#ea580c', medium:'#d97706', low:'#16a34a', minimal:'#2563eb' }[level] || '#64748b';
  }

  async function scoreRisk() {
    const text = document.getElementById('txt').value.trim();
    if (!text) return;
    const btn = document.getElementById('scoreBtn');
    btn.disabled = true;
    document.getElementById('loader').style.display = 'block';
    document.getElementById('results').style.display = 'none';

    try {
      const r = await fetch(`${API}/risk/score`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': PARAIQ_KEY },
        body: JSON.stringify({ text, context: document.getElementById('context').value, label: 'Document' })
      });
      const d = await r.json();
      const color = riskColor(d.level);

      document.getElementById('scoreNum').textContent = d.score;
      document.getElementById('scoreNum').style.color = color;
      document.getElementById('riskLevel').textContent = d.level.toUpperCase();
      document.getElementById('riskLevel').style.color = color;
      document.getElementById('barFill').style.width = (d.score / 10 * 100) + '%';
      document.getElementById('barFill').style.background = color;

      // Breakdown
      const bd = d.category_breakdown || {};
      document.getElementById('breakdown').innerHTML = Object.entries(bd)
        .sort((a,b) => b[1]-a[1])
        .map(([k,v]) => `<div class="breakdown-row"><span>${k.replace(/_/g,' ')}</span><strong>${v}</strong></div>`)
        .join('') || '<div style="color:#9ca3af;font-size:13px">No breakdown available</div>';

      // Signals
      const sigs = d.top_signals || [];
      document.getElementById('signals').innerHTML = sigs
        .map(s => `<div class="signal-item"><span><strong>${s.signal}</strong> <span style="color:#9ca3af">(${s.category})</span></span><span style="color:#374151;font-weight:600">${s.contribution}</span></div>`)
        .join('') || '<div style="color:#9ca3af;font-size:13px">None detected</div>';

      // Mitigations
      const mits = d.mitigating_factors || [];
      document.getElementById('mitigations').innerHTML = mits.length
        ? mits.map(m => `<div class="signal-item"><span>${m.signal}</span><span style="color:#16a34a;font-weight:600">${m.contribution}</span></div>`).join('')
        : '<div style="color:#9ca3af;font-size:13px">No mitigating factors found</div>';

      document.getElementById('results').style.display = 'block';
    } catch(e) {
      alert('Error: ' + e.message);
    } finally {
      btn.disabled = false;
      document.getElementById('loader').style.display = 'none';
    }
  }
</script>
  <script src="paraiq-sidebar.js"></script>
  <script src="paraiq-persist.js"></script>
  <script src="paraiq-export.js"></script>
</body>
</html>
